{% include "accounts/logout.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Parking</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" crossorigin=""/>
    <style>
        #map {
            height: 80vh;
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }
        /* Stylized Header */
        .header {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #007bff;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.3s ease;
        }
        .header:hover {
            transform: scale(1.05);
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 15px 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }
        #radiusInput {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: border 0.3s ease;
        }
        #radiusInput:focus {
            border-color: #007bff;
        }
        .find-parking-button {
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }
        .find-parking-button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .spinner {
            display: none;
            margin-left: 10px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #007bff;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        .popup-button {
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        color: #fff;
        font-weight: bold;
        transition: background-color 0.3s, transform 0.2s;
        box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
    }
    .take-me-button {
        background-color: #28a745;
    }
    .take-me-button:hover {
        background-color: #218838;
        transform: translateY(-2px);
    }
    .book-spot-button {
        background-color: #007bff;
    }
    .book-spot-button:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
    }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Stylized Header -->
    <div class="header">Find Nearest Parking Lot</div>
    
    <div class="controls">
        <input type="text" id="radiusInput" placeholder="Radius in meters (e.g., 10000)" />
        <button class="find-parking-button" onclick="findNearestParking()">Find Parking</button>
        <div class="spinner" id="loadingSpinner"></div>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" crossorigin=""></script>
    <script>
        let map;
        let userMarker;
        let parkingMarkers = [];

        function initializeMap(lat, lon) {
            map = L.map('map').setView([lat, lon], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            const redIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });

            userMarker = L.marker([lat, lon], { icon: redIcon }).addTo(map)
                .bindPopup("You are here!")
                .openPopup();
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                initializeMap(lat, lon);
            }, error => {
                console.error("Geolocation error:", error);
                alert("Unable to retrieve your location.");
                initializeMap(51.505, -0.09);
            });
        } else {
            alert("Geolocation is not supported by your browser.");
            initializeMap(51.505, -0.09);
        }

        async function findNearestParking() {
            const radius = document.getElementById('radiusInput').value || 10000;
            const userLat = userMarker.getLatLng().lat;
            const userLon = userMarker.getLatLng().lng;

            const queryUrl = `http://overpass-api.de/api/interpreter?data=[out:json];node[amenity=parking](around:${radius},${userLat},${userLon});out;`;

            document.getElementById('loadingSpinner').style.display = 'inline-block';

            try {
                const response = await fetch(queryUrl);
                const data = await response.json();

                parkingMarkers.forEach(marker => map.removeLayer(marker));
                parkingMarkers = [];

                data.elements.forEach(element => {
                    if (element.type === "node") {
                        const parkingMarker = L.marker([element.lat, element.lon]).addTo(map);
                        const popupTextParkingName = element.tags && element.tags.name ? element.tags.name : "Unidentified Parking Lot";
                        const popupTextParkingCapacity = element.tags && element.tags.capacity ? element.tags.capacity : "Unknown Capacity";
                        const popupContent = `
                            <div class="popup-content">
                                <strong>${popupTextParkingName}(${popupTextParkingCapacity})</strong>
                                <div class="popup-buttons">
                                    <button class="popup-button take-me-button" onclick="openDirections(${userLat}, ${userLon}, ${element.lat}, ${element.lon})">Take Me</button>
                                    <button class="popup-button book-spot-button">Book Spot</button>
                                </div>
                            </div>
                        `;

                        parkingMarker.bindPopup(popupContent);
                        parkingMarkers.push(parkingMarker);
                    }
                });

                alert(`Found ${data.elements.length} parking lots within ${radius} meters.`);
            } catch (error) {
                console.error("Error fetching parking data:", error);
                alert("Could not retrieve parking data.");
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        }

        function openDirections(userLat, userLon, destLat, destLon) {
            const directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destLat},${destLon}&travelmode=driving`;
            window.open(directionsUrl, '_blank');
        }
    </script>
</body>
